# Skill distribution mapping
#
# Maps downstream repos to source plugins in this monorepo.
# The distribute_skills.py script reads this file to determine
# which skills to copy to each downstream repo.
#
# Only skills/ directories are distributed (SKILL.md + subdirectories).
# Commands, agents, and plugin metadata stay in the shared marketplace repo.

github_org: outcomeeng

repos:
  foundation:
    description: "Foundation skills: prose, plugin development, frontend design"
    plugins:
      - prose
      - claude
      - frontend

  spec-tree:
    description: "Spec Tree methodology skills for Outcome Engineering"
    plugins:
      - spec-tree

  typescript:
    description: "TypeScript engineering skills"
    prerequisites:
      - "outcomeeng/spec-tree (for /testing and /auditing-tests)"
    plugins:
      - typescript

  python:
    description: "Python engineering skills"
    prerequisites:
      - "outcomeeng/spec-tree (for /testing and /auditing-tests)"
    plugins:
      - python
