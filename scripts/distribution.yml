# Skill distribution mapping
#
# Maps downstream repos to source plugins in this monorepo.
# The distribute_skills.py script reads this file to determine
# which skills to copy to each downstream repo.
#
# Only skills/ directories are distributed (SKILL.md + subdirectories).
# Commands, agents, and plugin metadata are Claude-specific and stay here.

github_org: outcomeeng

repos:
  foundation:
    description: "Foundation skills: prose, plugin development, frontend design"
    plugins:
      - prose
      - claude
      - frontend

  spec-tree:
    description: "Spec Tree skills for spec-driven development"
    plugins:
      - spec-tree

  typescript:
    description: "TypeScript engineering skills"
    prerequisites:
      - "outcomeeng/spec-tree (for /testing and /reviewing-tests)"
    plugins:
      - typescript

  python:
    description: "Python engineering skills"
    prerequisites:
      - "outcomeeng/spec-tree (for /testing and /reviewing-tests)"
    plugins:
      - python

  legacy:
    description: "Deprecated Outcome Engineering skills (superseded by spec-tree)"
    plugins:
      - test
      - spx-legacy
      - specs
      - core
